<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Header Forensics — SENTINEL</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <div id="sb"></div>
  <div class="main">
    <div id="topbar-mount"></div>

    <div class="page-header">
      <div>
        <div class="page-title">📧 Phishing Header Forensics Lab</div>
        <div class="page-subtitle">Security+ Domain 2 · Threats, Vulnerabilities & Mitigations · 5 emails · 100 pts max</div>
      </div>
      <span class="badge badge-high">Domain 2 — 22% of Sec+ exam</span>
    </div>

    <!-- Progress bar -->
    <div class="card mb-4" style="padding:1rem 1.25rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
        <span class="text-xs text-muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.08em;">Email Progress</span>
        <span id="phish-progress-label" class="text-xs font-mono" style="color:var(--teal);">0 / 5 emails</span>
      </div>
      <div style="height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden;">
        <div id="phish-progress-fill" style="height:100%;width:0%;background:var(--teal);border-radius:3px;transition:width 0.4s ease;"></div>
      </div>
    </div>

    <!-- Two-column layout -->
    <div style="display:grid;grid-template-columns:1fr 280px;gap:1rem;align-items:start;">
      <!-- Left: email content -->
      <div id="phish-main"></div>

      <!-- Right: score + email list -->
      <div id="phish-right-panel" style="position:sticky;top:1rem;"></div>
    </div>

  </div><!-- .main -->
</div><!-- .app -->

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/glossary.js"></script>
<script src="js/phishing.js"></script>
</body>
</html>
