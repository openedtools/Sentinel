<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENTINEL — Vulnerability Prioritization Lab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div id="sb"></div>
  <div class="main">
    <div id="topbar-mount"></div>

    <div style="display:grid;grid-template-columns:1fr 280px;gap:1rem;min-width:0;">

      <!-- ── Left: Main round area ── -->
      <div>
        <div class="page-header">
          <div>
            <div class="page-title">🎯 Vulnerability Prioritization Lab</div>
            <div class="page-subtitle">3 rounds · Build a patch queue from real CVEs given limited maintenance windows. Covers Security+ Domain 2 — Vulnerability Management.</div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="card mb-4" style="padding:0.875rem 1.25rem;">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-muted">Progress</span>
            <span class="text-xs font-mono" id="vuln-progress-label">0 / 3 rounds</span>
          </div>
          <div class="progress-bar" style="height:6px;">
            <div class="progress-fill" id="vuln-progress-fill" style="width:0%"></div>
          </div>
        </div>

        <!-- Dynamic round content -->
        <div id="vuln-main"></div>

      </div>

      <!-- ── Right: Score + reference panel ── -->
      <div style="position:sticky;top:72px;height:fit-content;display:flex;flex-direction:column;gap:1rem;" id="vuln-right-panel">
        <!-- populated by updateRightPanel() -->
      </div>

    </div>

  </div><!-- .main -->
</div><!-- .app -->

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/glossary.js"></script>
<script src="js/vulns.js"></script>
</body>
</html>
