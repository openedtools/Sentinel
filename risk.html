<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENTINEL — Risk Register Simulator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div id="sb"></div>
  <div class="main">
    <div id="topbar-mount"></div>

    <div style="display:grid;grid-template-columns:1fr 260px;gap:1rem;min-width:0;">

      <div>
        <div class="page-header">
          <div>
            <div class="page-title">⚖ Risk Register Simulator</div>
            <div class="page-subtitle">3 rounds · 15 risks · Plot each threat on the 5×5 matrix, choose a response strategy, and select controls. Security+ Domain 5 — Risk Management.</div>
          </div>
        </div>

        <div class="card mb-4" style="padding:.875rem 1.25rem;">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-muted">Progress</span>
            <span class="text-xs font-mono" id="risk-progress-label">0 / 15 risks assessed</span>
          </div>
          <div class="progress-bar" style="height:6px;">
            <div class="progress-fill" id="risk-progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div id="risk-main"></div>
      </div>

      <div style="position:sticky;top:72px;height:fit-content;display:flex;flex-direction:column;gap:1rem;" id="risk-right-panel"></div>

    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/glossary.js"></script>
<script src="js/risk.js"></script>
</body>
</html>
